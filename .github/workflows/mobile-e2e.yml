name: mobile-e2e

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .github/workflows/**
      - common/**
      - tests/**
      - config/**
      - requirements.txt
  workflow_dispatch:
    inputs:
      test_target:
        description: "Test module (e.g. tests.test_qis_asus_router) or file path (e.g. tests/test_qis_asus_router.py)"
        required: true
        default: "tests.test_qis_asus_router"
      dut_config:
        description: "Optional DUT config path (e.g. config/dut/GS-BE12000.json)"
        required: false
        default: ""

jobs:
  e2e:
    # iOS requires a macOS runner. Use a self-hosted macOS runner in your lab
    # with real iOS + Android devices attached and Appium installed.
    runs-on: [self-hosted, macOS]


    strategy:
      fail-fast: false
      max-parallel: 1 # one runner + real devices: avoid parallel contention
      matrix:
        include:
          - platform: ios
            app_config: config/app/ios_config.json
          - platform: android
            app_config: config/app/android_config.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Python version (system)
        shell: bash
        run: |
          set -euo pipefail
          command -v python3
          python3 --version

      - name: Create venv
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv
          echo "${PWD}/.venv/bin" >> "${GITHUB_PATH}"
          .venv/bin/python --version
          .venv/bin/python -m pip --version

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ensure Appium is running (best-effort)
        shell: bash
        run: |
          set -euo pipefail
          if lsof -nP -iTCP:4723 -sTCP:LISTEN >/dev/null 2>&1; then
            echo "Appium already listening on :4723"
            exit 0
          fi

          if command -v appium >/dev/null 2>&1; then
            echo "Starting Appium server on :4723"
            nohup appium --port 4723 --base-path / --log-no-colors --log-timestamp > appium.log 2>&1 &
            sleep 2
          else
            echo "appium command not found; assuming Appium is managed outside the workflow"
          fi

      - name: Run test (${{ matrix.platform }})
        shell: bash
        env:
          APP_CONFIG: ${{ matrix.app_config }}
          TEST_TARGET: ${{ inputs.test_target }}
          DUT_CONFIG: ${{ inputs.dut_config }}
        run: |
          set -euo pipefail

          # On pull_request triggers there are no workflow_dispatch inputs.
          TEST_TARGET="${TEST_TARGET:-tests.test_qis_asus_router}"
          DUT_CONFIG="${DUT_CONFIG:-}"

          DUT_ARGS=""
          if [[ -n "${DUT_CONFIG}" ]]; then
            DUT_ARGS="-dut ${DUT_CONFIG}"
          fi

          echo "Running: ${TEST_TARGET} with ${APP_CONFIG} ${DUT_ARGS}"

          if [[ "${TEST_TARGET}" == *.py ]]; then
            python "${TEST_TARGET}" -app "${APP_CONFIG}" ${DUT_ARGS}
          else
            python -m "${TEST_TARGET}" -app "${APP_CONFIG}" ${DUT_ARGS}
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.platform }}-${{ github.run_id }}
          path: |
            results/**
            appium.log
          if-no-files-found: warn
